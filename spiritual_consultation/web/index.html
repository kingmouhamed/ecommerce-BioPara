<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="spiritual_consultation">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=2">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>BioPara</title>
  <link rel="manifest" href="manifest.json">

  <!-- Jitsi Meet API for Real Audio/Video Calls -->
  <script src="https://8x8.vc/vpaas-magic-cookie-free/external_api.js" async></script>

  <!-- Arabic Google Fonts — Tajawal + Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Tajawal', 'Cairo', Arial, sans-serif;
      direction: rtl;
      background-color: #F5F0E8;
    }
    /* Ensure Flutter canvas renders correctly */
    flt-glass-pane, flt-scene, flt-scene-host {
      font-family: 'Tajawal', 'Cairo', Arial, sans-serif !important;
    }
  </style>

  <style>
    #jitsi-container {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      background: #1E2A1E;
    }
    #jitsi-container.visible {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Jitsi Meet iframe container -->
  <div id="jitsi-container"></div>

  <script>
    var jitsiApi = null;

    window.startJitsiCall = function(roomId, displayName, isVideo) {
      var container = document.getElementById('jitsi-container');
      if (!container) return;

      // Clean up any existing session
      if (jitsiApi) {
        try { jitsiApi.dispose(); } catch(e) {}
        jitsiApi = null;
      }

      container.classList.add('visible');

      var domain = '8x8.vc';
      var options = {
        roomName: 'vpaas-magic-cookie-free/' + roomId,
        parentNode: container,
        width: '100%',
        height: '100%',
        userInfo: { displayName: displayName || 'BioPara User' },
        configOverwrite: {
          startWithAudioMuted: false,
          startWithVideoMuted: !isVideo,
          disableDeepLinking: true,
          prejoinPageEnabled: false,
          disableInitialGUM: false,
          enableLayerSuspension: true,
          p2p: { enabled: true },
          toolbarButtons: isVideo
            ? ['microphone','camera','hangup','chat','tileview','fullscreen']
            : ['microphone','hangup','chat'],
        },
        interfaceConfigOverwrite: {
          SHOW_JITSI_WATERMARK: false,
          SHOW_BRAND_WATERMARK: false,
          SHOW_CHROME_EXTENSION_BANNER: false,
          TOOLBAR_ALWAYS_VISIBLE: true,
          DEFAULT_BACKGROUND: '#1E2A1E',
          LANG_DETECTION: false,
          DEFAULT_LANGUAGE: 'ar',
        },
      };

      try {
        jitsiApi = new JitsiMeetExternalAPI(domain, options);

        jitsiApi.addEventListeners({
          readyToClose: function() {
            window.onJitsiCallEnded && window.onJitsiCallEnded();
          },
          videoConferenceLeft: function() {
            window.onJitsiCallEnded && window.onJitsiCallEnded();
          },
          participantJoined: function(e) {
            window.onJitsiParticipantJoined && window.onJitsiParticipantJoined(e.id);
          },
        });
      } catch(err) {
        console.error('Jitsi init error:', err);
        container.classList.remove('visible');
      }
    };

    window.endJitsiCall = function() {
      var container = document.getElementById('jitsi-container');
      if (jitsiApi) {
        try { jitsiApi.executeCommand('hangup'); } catch(e) {}
        setTimeout(function() {
          try { jitsiApi.dispose(); } catch(e) {}
          jitsiApi = null;
        }, 500);
      }
      if (container) container.classList.remove('visible');
    };

    window.muteJitsiAudio = function(mute) {
      if (jitsiApi) {
        try { jitsiApi.executeCommand('toggleAudio'); } catch(e) {}
      }
    };

    window.toggleJitsiVideo = function() {
      if (jitsiApi) {
        try { jitsiApi.executeCommand('toggleVideo'); } catch(e) {}
      }
    };
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
