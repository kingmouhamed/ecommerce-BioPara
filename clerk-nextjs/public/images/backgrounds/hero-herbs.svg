<!-- Placeholder for medical herbs hero image -->
<svg width="600" height="384" viewBox="0 0 600 384" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <pattern id="herbs" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="3" fill="white" opacity="0.1"/>
      <path d="M50 10 L50 90 M30 30 L70 30 M30 50 L70 50 M30 70 L70 70" stroke="white" stroke-width="1" opacity="0.2"/>
      <circle cx="75" cy="75" r="2" fill="white" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="384" fill="url(#bg)"/>
  <rect width="600" height="384" fill="url(#herbs)"/>
  
  <!-- Herb illustrations -->
  <g transform="translate(150, 100)">
    <!-- Lavender -->
    <ellipse cx="0" cy="0" rx="40" ry="80" fill="#16a34a" opacity="0.3"/>
    <circle cx="0" cy="-60" r="15" fill="#22c55e" opacity="0.5"/>
    <circle cx="-20" cy="-40" r="12" fill="#22c55e" opacity="0.5"/>
    <circle cx="20" cy="-40" r="12" fill="#22c55e" opacity="0.5"/>
    <rect x="-2" y="-60" width="4" height="60" fill="#15803d"/>
  </g>
  
  <g transform="translate(300, 150)">
    <!-- Mint -->
    <ellipse cx="0" cy="0" rx="35" ry="70" fill="#16a34a" opacity="0.3"/>
    <ellipse cx="-15" cy="-30" rx="20" ry="10" fill="#22c55e" opacity="0.5" transform="rotate(-20 -15 -30)"/>
    <ellipse cx="15" cy="-30" rx="20" ry="10" fill="#22c55e" opacity="0.5" transform="rotate(20 15 -30)"/>
    <rect x="-2" y="-50" width="4" height="50" fill="#15803d"/>
  </g>
  
  <g transform="translate(450, 120)">
    <!-- Chamomile -->
    <circle cx="0" cy="0" r="30" fill="#fbbf24" opacity="0.3"/>
    <circle cx="0" cy="0" r="8" fill="#f59e0b" opacity="0.5"/>
    <circle cx="-20" cy="-20" r="6" fill="#fbbf24" opacity="0.5"/>
    <circle cx="20" cy="-20" r="6" fill="#fbbf24" opacity="0.5"/>
    <circle cx="-20" cy="20" r="6" fill="#fbbf24" opacity="0.5"/>
    <circle cx="20" cy="20" r="6" fill="#fbbf24" opacity="0.5"/>
    <rect x="-2" y="-30" width="4" height="30" fill="#15803d"/>
  </g>
  
  <!-- Text overlay -->
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.8">
    أعشاب طبية طبيعية
  </text>
  <text x="300" y="350" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.6">
    100% طبيعية وخالصة
  </text>
</svg>
