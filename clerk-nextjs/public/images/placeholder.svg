<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#9ca3af" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg)"/>
  <rect width="300" height="300" fill="url(#dots)"/>
  
  <!-- Product Placeholder Icon -->
  <g transform="translate(150, 150)">
    <!-- Box -->
    <rect x="-60" y="-40" width="120" height="80" fill="#d1d5db" rx="8"/>
    <rect x="-60" y="-40" width="120" height="80" fill="none" stroke="#9ca3af" stroke-width="2" rx="8"/>
    
    <!-- Box Top -->
    <path d="M-60 -20 L0 -50 L60 -20" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
    
    <!-- Plus Icon -->
    <circle cx="0" cy="0" r="20" fill="#10b981" opacity="0.1"/>
    <path d="M-10 0 L10 0 M0 -10 L0 10" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    Product Image
  </text>
</svg>
